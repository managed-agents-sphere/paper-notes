<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1300" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3f3f46"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#d97706" stroke-width="1.1" opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1080" height="1300" fill="#fdfcfa"/>

  <!-- ─────────── TITLE ─────────── -->
  <text x="60" y="58" font-size="26" font-weight="700" fill="#18181b" letter-spacing="-0.012em">Microcompact, the honest mental model</text>
  <text x="60" y="84" font-size="14" fill="#52525b">
    KV cache is per-token and continuous. <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="600" fill="#2563eb">cache_edits</tspan> doesn't delete a "block" — it masks a <tspan font-style="italic">token range</tspan> addressed by content-block name.
  </text>
  <line x1="60" y1="108" x2="1020" y2="108" stroke="#e4e4e7"/>

  <!-- ─────────── ① LOGICAL ─────────── -->
  <text x="60" y="140" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">① LOGICAL — API content_blocks (what you send)</text>

  <g transform="translate(100, 158)">
    <rect x="0"   y="0" width="70"  height="48" fill="#ffffff" stroke="#d4d4d8" rx="3"/>
    <text x="35" y="20" font-size="11.5" font-weight="600" text-anchor="middle" fill="#18181b">system</text>
    <text x="35" y="36" font-size="10.5" text-anchor="middle" fill="#71717a" font-family="ui-monospace, monospace">~200</text>

    <rect x="78"  y="0" width="55"  height="48" fill="#ffffff" stroke="#d4d4d8" rx="3"/>
    <text x="105.5" y="20" font-size="11.5" font-weight="600" text-anchor="middle" fill="#18181b">user</text>
    <text x="105.5" y="36" font-size="10.5" text-anchor="middle" fill="#71717a" font-family="ui-monospace, monospace">~40</text>

    <rect x="141" y="0" width="75"  height="48" fill="#ffffff" stroke="#d4d4d8" rx="3"/>
    <text x="178.5" y="20" font-size="11.5" font-weight="600" text-anchor="middle" fill="#18181b">tool_use</text>
    <text x="178.5" y="36" font-size="10.5" text-anchor="middle" fill="#71717a" font-family="ui-monospace, monospace">~60</text>

    <rect x="224" y="0" width="340" height="48" fill="#fef3c7" stroke="#d97706" stroke-width="1.4" rx="3"/>
    <text x="394" y="20" font-size="12" font-weight="700" text-anchor="middle" fill="#854d0e">tool_result(toolu_123)</text>
    <text x="394" y="36" font-size="10.5" text-anchor="middle" fill="#854d0e" font-family="ui-monospace, monospace">~3,072 · cache_reference: "toolu_123"</text>

    <rect x="572" y="0" width="248" height="48" fill="#ffffff" stroke="#d4d4d8" rx="3"/>
    <text x="696" y="20" font-size="11.5" font-weight="600" text-anchor="middle" fill="#18181b">assistant</text>
    <text x="696" y="36" font-size="10.5" text-anchor="middle" fill="#71717a" font-family="ui-monospace, monospace">~6,800</text>

    <rect x="828" y="0" width="52"  height="48" fill="#ffffff" stroke="#d4d4d8" rx="3"/>
    <text x="854" y="20" font-size="11.5" font-weight="600" text-anchor="middle" fill="#18181b">user</text>
    <text x="854" y="36" font-size="10.5" text-anchor="middle" fill="#71717a" font-family="ui-monospace, monospace">~68</text>
  </g>

  <text x="60" y="240" font-size="11.5" fill="#71717a" font-style="italic">Each box is a JSON content_block. Discrete here only because the API protocol is structured.</text>

  <line x1="540" y1="258" x2="540" y2="294" stroke="#3f3f46" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="548" y="282" font-size="11.5" fill="#52525b" font-style="italic">tokenize · format with role markers</text>

  <!-- ─────────── ② PHYSICAL ─────────── -->
  <text x="60" y="324" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">② PHYSICAL — continuous KV cache (one token sequence, one tensor)</text>

  <g transform="translate(100, 350)">
    <text x="0"   y="-2" font-size="10" fill="#a1a1aa" font-family="ui-monospace, monospace">0</text>
    <text x="880" y="-2" font-size="10" fill="#a1a1aa" font-family="ui-monospace, monospace" text-anchor="end">10,240</text>
  </g>

  <g transform="translate(100, 354)">
    <rect x="0" y="0" width="880" height="46" fill="#fafaf9" stroke="#3f3f46" stroke-width="1.4" rx="2"/>

    <line x1="17"  y1="0" x2="17"  y2="46" stroke="#d4d4d8" stroke-width="1"/>
    <line x1="20"  y1="0" x2="20"  y2="46" stroke="#d4d4d8" stroke-width="1"/>
    <line x1="25"  y1="0" x2="25"  y2="46" stroke="#d4d4d8" stroke-width="1"/>
    <line x1="289" y1="0" x2="289" y2="46" stroke="#d97706" stroke-width="1.4"/>
    <line x1="874" y1="0" x2="874" y2="46" stroke="#d4d4d8" stroke-width="1"/>

    <rect x="25" y="0" width="264" height="46" fill="#fef3c7"/>
    <rect x="25" y="0" width="264" height="46" fill="url(#hatch)"/>
    <text x="157" y="22" font-size="11.5" font-weight="700" text-anchor="middle" fill="#7c2d12">tool_result toolu_123</text>
    <text x="157" y="38" font-size="10.5" text-anchor="middle" fill="#7c2d12" font-family="ui-monospace, monospace">3,072 tok</text>
  </g>

  <g transform="translate(100, 340)" font-size="10.5" fill="#71717a" font-family="ui-monospace, monospace">
    <path d="M 0 8 L 0 4 L 25 4 L 25 8" stroke="#71717a" fill="none" stroke-width="0.8"/>
    <text x="12.5" y="-2" text-anchor="middle">sys / usr / tool_use</text>
    <path d="M 289 8 L 289 4 L 874 4 L 874 8" stroke="#71717a" fill="none" stroke-width="0.8"/>
    <text x="581" y="-2" text-anchor="middle">assistant</text>
    <path d="M 874 8 L 874 4 L 880 4 L 880 8" stroke="#71717a" fill="none" stroke-width="0.8"/>
  </g>

  <!-- inline annotation lozenge under the strip -->
  <line x1="257" y1="400" x2="257" y2="422" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="100" y="422" width="640" height="36" fill="#fffbeb" stroke="#fde68a" stroke-width="0.9" rx="4"/>
  <text x="116" y="445" font-size="11.5" fill="#7c2d12" font-style="italic">
    The highlight is a logical range, not a separate cache entry. The server resolves "toolu_123" to a token interval.
  </text>

  <text x="60" y="484" font-size="11.5" fill="#71717a" font-style="italic">
    Inside the cache there is no concept of "system block" vs "tool_result block" — only token positions with K/V vectors.
  </text>

  <!-- ─────────── ③ PREFILL MASK ─────────── -->
  <text x="60" y="522" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">③ THIS TURN'S PREFILL — cache_edits applies a mask over the named range</text>

  <g transform="translate(100, 548)">
    <text x="0"   y="-2" font-size="10" fill="#a1a1aa" font-family="ui-monospace, monospace">0</text>
    <text x="880" y="-2" font-size="10" fill="#a1a1aa" font-family="ui-monospace, monospace" text-anchor="end">10,240</text>
  </g>

  <g transform="translate(100, 552)">
    <rect x="0" y="0" width="25" height="46" fill="#ffffff" stroke="#18181b" stroke-width="1.4" rx="2"/>
    <rect x="289" y="0" width="591" height="46" fill="#ffffff" stroke="#18181b" stroke-width="1.4" rx="2"/>
    <rect x="25" y="0" width="264" height="46" fill="none" stroke="#d4d4d8" stroke-width="1" stroke-dasharray="5 4" rx="2"/>
    <text x="157" y="22" font-size="11.5" font-style="italic" text-anchor="middle" fill="#a1a1aa">3,072 tok masked</text>
    <text x="157" y="38" font-size="10.5" text-anchor="middle" fill="#a1a1aa" font-family="ui-monospace, monospace">not fed to attention this turn</text>
  </g>

  <text x="60" y="626" font-size="13" font-weight="600" fill="#b45309">
    prefill_input = 7,168 tok
    <tspan font-weight="400" fill="#92400e"> · saved 3,072 / 30%</tspan>
  </text>
  <text x="60" y="646" font-size="11.5" fill="#71717a" font-style="italic">
    Physical KV pages remain on the server until prompt-cache TTL expires; the deletion is per-request, not an evict.
  </text>

  <line x1="60" y1="672" x2="1020" y2="672" stroke="#e4e4e7"/>

  <!-- ─────────── ④ INVARIANTS ─────────── -->
  <text x="60" y="702" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">④ INVARIANTS — what does NOT change</text>

  <g transform="translate(60, 720)" font-size="13" fill="#27272a">
    <text x="0" y="20" font-weight="600">Bytes on the wire</text>
    <text x="240" y="20" fill="#52525b">unchanged + ~80 B of new tags (cache_reference, cache_edits)</text>

    <text x="0" y="46" font-weight="600">Cache hit logic</text>
    <text x="240" y="46" fill="#52525b">unchanged — cache_control prefix-match still works (these new fields excluded from cache key)</text>

    <text x="0" y="72" font-weight="600">Local terminal view</text>
    <text x="240" y="72" fill="#52525b">unchanged — no "[Old tool result cleared]" placeholder</text>

    <text x="0" y="98" font-weight="600">Server KV memory</text>
    <text x="240" y="98" fill="#52525b">unchanged within TTL — mask is logical, not eviction</text>

    <text x="0" y="124" font-weight="600" fill="#b45309">Prefill input THIS turn</text>
    <text x="240" y="124" fill="#b45309">CHANGES — shorter by the masked range</text>
  </g>

  <line x1="60" y1="866" x2="1020" y2="866" stroke="#e4e4e7"/>

  <!-- ─────────── ⑤ PROVENANCE ─────────── -->
  <text x="60" y="896" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">⑤ PROVENANCE — what's verified vs inferred (read this before propagating)</text>

  <g transform="translate(60, 914)" font-size="12.5">
    <text x="0" y="22" fill="#16a34a" font-weight="700">✓</text>
    <text x="20" y="22" fill="#27272a">Wire format (cache_reference, cache_edits) — </text>
    <text x="380" y="22" fill="#52525b" font-style="italic">spacewander 2026-04 (Claude Code source-derived)</text>

    <text x="0" y="46" fill="#16a34a" font-weight="700">✓</text>
    <text x="20" y="46" fill="#27272a">Pinned re-send: client repeats edit script every turn — </text>
    <text x="380" y="46" fill="#52525b" font-style="italic">spacewander 2026-04</text>

    <text x="0" y="70" fill="#16a34a" font-weight="700">✓</text>
    <text x="20" y="70" fill="#27272a">Cached vs Time-based microcompact paths — </text>
    <text x="380" y="70" fill="#52525b" font-style="italic">finisky 2026 (post-leak source analysis)</text>

    <text x="0" y="94" fill="#16a34a" font-weight="700">✓</text>
    <text x="20" y="94" fill="#27272a">Prompt-cache hit is byte-prefix matching on cache_control — </text>
    <text x="380" y="94" fill="#52525b" font-style="italic">Anthropic official docs</text>

    <text x="0" y="118" fill="#d97706" font-weight="700">?</text>
    <text x="20" y="118" fill="#27272a">Server-side resolution from "toolu_123" to a token range — </text>
    <text x="380" y="118" fill="#a16207" font-style="italic">logically necessary, but Anthropic does not document the mechanism</text>

    <text x="0" y="142" fill="#d97706" font-weight="700">?</text>
    <text x="20" y="142" fill="#27272a">PagedAttention-style page management — </text>
    <text x="380" y="142" fill="#a16207" font-style="italic">industry-standard pattern, not confirmed for Anthropic specifically</text>
  </g>

  <line x1="60" y1="1086" x2="1020" y2="1086" stroke="#e4e4e7"/>

  <!-- ─────────── ⑥ RESULT (three-layer comparison) ─────────── -->
  <text x="60" y="1116" font-size="11" font-weight="700" fill="#a1a1aa" letter-spacing="0.14em">⑥ RESULT — three layers, only one shrinks</text>

  <g transform="translate(60, 1140)" font-size="13">
    <!-- Local history -->
    <text x="0"   y="14" font-weight="600" fill="#18181b">Local history</text>
    <rect x="180" y="2" width="720" height="14" fill="#52525b" rx="2"/>
    <text x="912" y="14" fill="#52525b" font-family="ui-monospace, 'SF Mono', Menlo, monospace">10,240 tok</text>

    <!-- Wire payload -->
    <text x="0"   y="42" font-weight="600" fill="#18181b">Wire payload</text>
    <rect x="180" y="30" width="724" height="14" fill="#2563eb" rx="2"/>
    <text x="912" y="42" fill="#2563eb" font-family="ui-monospace, 'SF Mono', Menlo, monospace">10,240 tok + 80 B</text>

    <!-- Prefill input -->
    <text x="0"   y="70" font-weight="600" fill="#18181b">Prefill input</text>
    <rect x="180" y="58" width="504" height="14" fill="#d97706" rx="2"/>
    <rect x="684" y="58" width="216" height="14" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2" rx="2"/>
    <text x="792" y="69" font-size="11" text-anchor="middle" fill="#d97706" font-style="italic">saved 3,072 tok</text>
    <text x="912" y="70" fill="#d97706" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-weight="700">7,168 tok</text>
  </g>
</svg>
